<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>链接生成器</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="app">
    <section class="screen active">
      <h1>链接生成器</h1>
      <p class="subtitle">批量生成一次性测试链接</p>

      <input id="countInput" class="admin-input" type="number" value="10" min="1" max="1000" />

      <button id="generateBtn" class="btn red">生成链接</button>
      <button id="copyBtn" class="btn light">复制全部</button>

      <p id="statusText" class="subtitle"></p>

      <textarea id="linksOutput" class="links-output" readonly></textarea>
    </section>
  </main>

  <script src="js/admin.js"></script>
</body>
</html>
