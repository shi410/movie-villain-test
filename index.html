<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>反派电影人格测试</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="app">

    <section id="homePage" class="screen active home-screen">
      <img class="home-cover" src="images/home-cover.jpg" alt="反派电影人格测试" />
      <button id="startBtn" class="btn home-start-btn">开始测试</button>
    </section>

    <section id="introPage" class="screen">
      <div class="file-title">电影档案</div>
      <div class="file-subtitle">MOVIE FILE</div>
      <div class="file-list">
        <div><span>影片编号</span><strong>NO.024</strong></div>
        <div><span>片长</span><strong>约 3 分钟</strong></div>
        <div><span>主演</span><strong>你自己</strong></div>
      </div>
      <p class="subtitle">请根据第一直觉作答。没有标准答案，只有你的真实选择。</p>
      <button id="enterBtn" class="btn red">进入第一幕</button>
    </section>

    <section id="questionPage" class="screen">
      <div class="question-top">
        <span id="sceneText">第一幕</span>
        <span id="countText">1 / 3</span>
      </div>
      <div class="progress"><div id="progressBar"></div></div>
      <h2 id="questionText"></h2>
      <div id="options" class="options"></div>
    </section>

<section id="resultPage" class="screen result-screen">
  <div class="result-hero">
    <div class="result-meta">
      <span id="resultNumber"></span>
      <span id="resultSource"></span>
    </div>

    <div class="result-label">你的反派人格是</div>
    <h2 id="resultTitle"></h2>
    <div id="resultRole" class="result-role"></div>
    <div id="resultActor" class="result-actor"></div>
    <img id="resultImage" class="result-image" alt="" />
    <p id="resultQuote" class="result-quote"></p>
  </div>

  <div class="keyword-title">反派关键词</div>
  <div id="resultKeywords" class="keyword-list"></div>

  <section class="report-block">
    <h3>人格判词</h3>
    <div id="resultVerdict" class="report-text"></div>
  </section>

  <section class="report-block">
    <h3>反派维度解析</h3>
    <div id="resultRadar" class="radar-chart"></div>
    <div id="resultDimensions" class="dimension-list"></div>
    <div id="resultDimensionSummary" class="dimension-summary"></div>
  </section>

  <div id="resultSections"></div>

  <section class="report-block">
    <h3>相似角色</h3>
    <div id="resultSimilar" class="similar-list"></div>
  </section>

  <section class="hidden-line">
    <span>隐藏台词</span>
    <p id="resultHiddenLine"></p>
  </section>
</section>

  </main>

  <script src="data/questions.js"></script>
  <script src="data/personalities/homelander.js"></script>
  <script src="data/results.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
